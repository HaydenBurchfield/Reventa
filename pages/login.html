    <div class="nav-right">
      <a href="/pages/home.html">Home</a>
      <a href="/pages/explore.html">Explore</a>
      <a href="/pages/login.html">Login</a>
      <a href="/pages/search.html">Search</a>

    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu">
    <span></span>

  <!-- MOBILE NAV MENU -->

      <a href="/pages/login.html">Login</a>
      <a href="/pages/search.html">Search</a>
  </div>

  <div class="auth-card">

    <!-- Avatar icon -->
    <div class="auth-avatar">
      <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="44" cy="44" r="44" fill="#0a0a0a"/>
        <circle cx="44" cy="34" r="13" fill="white"/>
        <ellipse cx="44" cy="72" rx="22" ry="14" fill="white"/>
      </svg>
    </div>

    <div class="auth-field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" placeholder="">
    </div>

    <div class="auth-field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="">
    </div>

    <div class="auth-links">
      <a href="#" class="auth-link">Forgot Password</a>
      <a href="/pages/signup.html" class="auth-link">Sign Up</a>
    </div>

    <button class="btn-auth" onclick="handleLogin()">Login</button>

  </div>

  <script>
    function handleLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (!u || !p) { alert('Please enter your username and password.'); return; }
      alert('Welcome back, ' + u + '!');
    }
  </script>
</body>
