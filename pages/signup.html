<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ReVènta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body class="auth-body">

  <nav>
    <div class="nav-left">
      <a href="/pages/mens.html">Men</a>
      <a href="/pages/womens.html">Women</a>
      <a href="/pages/kids.html">Kids</a>
      <a href="/pages/sell.html" class="nav-sell">Sell+</a>
    </div>
    <a href="/index.html" class="nav-logo">Re<span id="theV">V</span>è<span>nta</span></a>
    <div class="nav-right">
      <a href="/pages/home.html">Home</a>
      <a href="/pages/explore.html">Explore</a>
      <a href="/pages/profile.html">Profile</a>
      <a href="/pages/messages.html">Messages</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-mobile-menu" id="navMobileMenu">
    <a href="/pages/mens.html">Men</a>
    <a href="/pages/womens.html">Women</a>
    <a href="/pages/kids.html">Kids</a>
    <a href="/pages/sell.html">Sell+</a>
    <a href="/pages/home.html">Home</a>
    <a href="/pages/explore.html">Explore</a>
    <a href="/pages/profile.html">Profile</a>
    <a href="/pages/messages.html">Messages</a>
  </div>

  <div class="auth-card">

    <div class="auth-logo">Re<span>V</span>ènta</div>

    <div class="auth-field">
      <label for="su-username">Username</label>
      <input type="text" id="su-username" autocomplete="username">
    </div>

    <div class="auth-field">
      <label for="su-email">Email</label>
      <input type="email" id="su-email" autocomplete="email">
    </div>

    <div class="auth-field">
      <label for="su-name">Name</label>
      <input type="text" id="su-name" autocomplete="name">
    </div>

    <div class="auth-field">
      <label for="su-password">Password</label>
      <input type="password" id="su-password" autocomplete="new-password">
    </div>

    <div class="auth-field">
      <label for="su-dob">Birth Date</label>
      <input type="date" id="su-dob">
    </div>

    <div class="auth-links" style="margin-top: 8px;">
      <span></span>
      <a href="login.html" class="auth-link">Already have an account?</a>
    </div>

    <button class="btn-auth" onclick="handleSignup()">Create Account</button>

  </div>

  <script src="/assets/js/main.js"></script>
  <script>
    function handleSignup() {
      var u = document.getElementById('su-username').value.trim();
      var e = document.getElementById('su-email').value.trim();
      var p = document.getElementById('su-password').value;
      if (!u || !e) { alert('Please fill in your username and email.'); return; }
      if (!p || p.length < 6) { alert('Password must be at least 6 characters.'); return; }
      alert('Account created! Welcome to ReVènta, ' + u + '.');
    }
  </script>
</body>
</html>
