<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body class="profile-body">

  <nav>
    <div class="nav-left">
      <a href="/pages/mens.html">Men</a>
      <a href="/pages/womens.html">Women</a>
      <a href="/pages/kids.html">Kids</a>
      <a href="/pages/sell.html" class="nav-sell">Sell+</a>
    </div>

    <a href="/index.html" class="nav-logo">Re<span id="theV">V</span>è<span>nta</span></a>

    <div class="nav-right">
      <a href="/pages/home.html">Home</a>
      <a href="/pages/explore.html">Explore</a>
      <a href="/pages/profile.html">Profile</a>
      <a href="/pages/messages.html">Messages</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  </nav>
  <!-- MOBILE NAV MENU -->
  <div class="nav-mobile-menu" id="navMobileMenu">
      <a href="/pages/mens.html">Men</a>
      <a href="/pages/womens.html">Women</a>
      <a href="/pages/kids.html">Kids</a>
      <a href="/pages/sell.html">Sell+</a>
      <a href="/pages/home.html">Home</a>
      <a href="/pages/explore.html">Explore</a>
      <a href="/pages/profile.html">Profile</a>
      <a href="/pages/messages.html">Messages</a>
  </div>

  <div class="profile-wrap">

    <!-- AVATAR -->
    <div class="profile-avatar-wrap">
      <div class="profile-avatar-circle" title="Change photo">
        <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="35" cy="22" r="14" fill="white"/>
          <ellipse cx="35" cy="56" rx="24" ry="14" fill="white"/>
        </svg>
        <input type="file" accept="image/*" onchange="changeAvatar(event)">
      </div>

      <!-- Username + edit -->
      <div class="profile-username-row">
        <input class="profile-username-input" id="usernameInput" type="text" value="@closet.marie" readonly>
        <button class="profile-edit-btn" onclick="toggleEdit()" title="Edit username">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.5 2.5l2 2L4 14H2v-2L11.5 2.5z" stroke="#6b6b6b" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- STATS -->
    <div class="profile-stats">

      <div>
        <p class="profile-stat-label">Followers</p>
        <div id="value">
          <h1>12k</h1>
        </div>
      </div>

      <div>
        <p class="profile-stat-label">Rating</p>
        <div id="value">
          <h1>398</h1>
        </div>
      </div>

      <div>
        <p class="profile-stat-label">Items</p>
        <div id="value">
          <h1>28</h1>
        </div>
      </div>

      <div id="stat_info">
        <div id="stat_info">
          <p class="profile-stat-label">Sold</p>
          <div id="value">
            <h1>73</h1>
          </div>
          
        </div>
      </div>

    </div>

    <!-- ITEMS GRID -->
    <div class="profile-items-grid">

      <div class="profile-item-card" onclick="location.href='/pages/product2.html'">
        <div class="profile-item-image">
          <div class="profile-item-image-inner s2"></div>
        </div>
        <div class="profile-item-desc">Description</div>
      </div>

      <div class="profile-item-card" onclick="location.href='/pages/product2.html'">
        <div class="profile-item-image">
          <div class="profile-item-image-inner s5"></div>
        </div>
        <div class="profile-item-desc">Description</div>
      </div>

      <div class="profile-item-card" onclick="location.href='/pages/product2.html'">
        <div class="profile-item-image">
          <div class="profile-item-image-inner s3"></div>
        </div>
        <div class="profile-item-desc">Description</div>
      </div>

      <div class="profile-item-card" onclick="location.href='/pages/product2.html'">
        <div class="profile-item-image">
          <div class="profile-item-image-inner s7"></div>
        </div>
        <div class="profile-item-desc">Description</div>
      </div>

    </div>
  </div>

  <script>
    function toggleEdit() {
      const inp = document.getElementById('usernameInput');
      if (inp.readOnly) {
        inp.readOnly = false;
        inp.focus();
        inp.select();
      } else {
        inp.readOnly = true;
      }
    }

    function changeAvatar(e) {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const circle = e.target.closest('.profile-avatar-circle');
      circle.style.backgroundImage = `url(${url})`;
      circle.style.backgroundSize = 'cover';
      circle.style.backgroundPosition = 'center';
      circle.querySelector('svg').style.display = 'none';
    }
  </script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
