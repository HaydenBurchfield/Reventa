<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THRIFT — Explore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="top-nav">
  <a href="index.html" class="nav-logo">THRIFT<span>.</span></a>
  <div class="nav-search"><input type="text" id="search-input" placeholder="Search items, brands, sellers..."></div>
  <div class="nav-links">
    <a href="index.html" class="nav-tab-link">Home</a>
    <a href="explore.html" class="nav-tab-link active">Explore</a>
    <a href="messages.html" class="nav-tab-link">Messages</a>
    <a href="profile.html" class="nav-tab-link">Profile</a>
  </div>
  <a href="sell.html"><button class="btn-sell">+ Sell</button></a>
</nav>

<main id="app">
  <div class="explore-header">
    <h2>Explore</h2>
    <div class="filter-row">
      <select class="filter-select" id="sort-select">
        <option value="newest">Newest First</option>
        <option value="price-low">Price: Low → High</option>
        <option value="price-high">Price: High → Low</option>
      </select>
      <select class="filter-select" id="condition-select">
        <option value="all">All Conditions</option>
        <option value="like-new">Like New</option>
        <option value="very-good">Very Good</option>
        <option value="good">Good</option>
      </select>
    </div>
  </div>
  <div class="categories"><div class="categories-scroll" id="explore-filters">
    <div class="cat-pill active" data-cat="all">All</div><div class="cat-pill" data-cat="tops">Tops</div><div class="cat-pill" data-cat="bottoms">Bottoms</div><div class="cat-pill" data-cat="dresses">Dresses</div><div class="cat-pill" data-cat="outerwear">Outerwear</div><div class="cat-pill" data-cat="shoes">Shoes</div><div class="cat-pill" data-cat="accessories">Accessories</div><div class="cat-pill" data-cat="vintage">Vintage</div><div class="cat-pill" data-cat="luxury">Luxury</div><div class="cat-pill" data-cat="bags">Bags</div>
  </div></div>
  <div class="product-grid" id="explore-grid"></div>
</main>

<nav id="bottom-nav">
  <a class="bottom-item" href="index.html"><div class="bottom-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="bottom-label">Home</div></a>
  <a class="bottom-item active" href="explore.html"><div class="bottom-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="bottom-label">Explore</div></a>
  <a class="bottom-item sell-btn" href="sell.html"><div class="bottom-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div class="bottom-label">Sell</div></a>
  <a class="bottom-item" href="likes.html"><div class="bottom-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><div class="bottom-label">Likes</div></a>
  <a class="bottom-item" href="messages.html"><div class="bottom-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="bottom-label">Messages</div></a>
  <a class="bottom-item" href="profile.html"><div class="bottom-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="bottom-label">Profile</div></a>
</nav>

<script src="data.js"></script>
<script src="modal.js"></script>
<script src="app.js"></script>
<script>
  let exploreFilter = 'all';

  function renderExplore(cat = 'all') {
    exploreFilter = cat;
    let items = cat === 'all' ? [...PRODUCTS] : PRODUCTS.filter(p => p.cat === cat);
    const sort = document.getElementById('sort-select')?.value || 'newest';
    const cond = document.getElementById('condition-select')?.value || 'all';
    if (cond !== 'all') {
      const m = { 'like-new': 'Like New', 'very-good': 'Very Good', 'good': 'Good' };
      items = items.filter(p => p.condition === m[cond]);
    }
    if (sort === 'price-low') items.sort((a, b) => a.price - b.price);
    if (sort === 'price-high') items.sort((a, b) => b.price - a.price);
    renderGrid('explore-grid', items);
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Handle ?q= search param passed from other pages
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      const results = PRODUCTS.filter(p =>
        p.title.toLowerCase().includes(q.toLowerCase()) ||
        p.brand.toLowerCase().includes(q.toLowerCase())
      );
      renderGrid('explore-grid', results);
      document.getElementById('search-input').value = q;
    } else {
      renderExplore();
    }

    document.getElementById('explore-filters')?.addEventListener('click', e => {
      const p = e.target.closest('.cat-pill');
      if (!p) return;
      document.querySelectorAll('#explore-filters .cat-pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      renderExplore(p.dataset.cat);
    });
    document.getElementById('sort-select')?.addEventListener('change', () => renderExplore(exploreFilter));
    document.getElementById('condition-select')?.addEventListener('change', () => renderExplore(exploreFilter));

    const si = document.getElementById('search-input');
    si?.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const results = PRODUCTS.filter(p =>
          p.title.toLowerCase().includes(si.value.toLowerCase()) ||
          p.brand.toLowerCase().includes(si.value.toLowerCase())
        );
        renderGrid('explore-grid', results);
      }
    });
  });
</script>
</body>
</html>
